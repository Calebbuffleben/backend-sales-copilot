syntax = "proto3";

package feedback_ingestion;

service FeedbackIngestionService {
  rpc PublishFeedback(PublishFeedbackRequest) returns (PublishFeedbackResponse);
}

message AnalysisPayload {
  string direct_feedback = 1;
  string conversation_state_json = 2;
  int32 samples_count = 3;
  int32 speech_count = 4;
  float mean_rms_dbfs = 5;
}

message PublishFeedbackRequest {
  string meeting_id = 1;
  string participant_id = 2;
  string participant_name = 3;
  string participant_role = 4;
  string feedback_type = 5;
  string severity = 6;
  int64 ts_ms = 7;
  int64 window_start_ms = 8;
  int64 window_end_ms = 9;
  string message = 10;
  string transcript_text = 11;
  float transcript_confidence = 12;
  AnalysisPayload analysis = 13;
  // Redundant tenant hint. MUST match the `tid` claim on the Authorization
  // Bearer token, otherwise the server responds with PERMISSION_DENIED.
  string tenant_id = 14;
}

message PublishFeedbackResponse {
  bool accepted = 1;
  string feedback_id = 2;
  string message = 3;
}
