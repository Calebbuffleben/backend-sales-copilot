syntax = "proto3";

package feedback_ingestion;

service FeedbackIngestionService {
  rpc PublishFeedback(PublishFeedbackRequest) returns (PublishFeedbackResponse);
}

message IndecisionMetrics {
  float conditional_language_score = 1;
  float postponement_likelihood = 2;
}

message AnalysisPayload {
  repeated float embedding = 1;
  repeated string keywords = 2;
  string sales_category = 3;
  float sales_category_confidence = 4;
  float category_intensity = 5;
  float category_ambiguity = 6;
  map<string, bool> category_flags = 7;
  repeated string conditional_keywords_detected = 8;
  IndecisionMetrics indecision_metrics = 9;
  string speech_act = 10;
  int32 samples_count = 11;
  int32 speech_count = 12;
  float mean_rms_dbfs = 13;
  string analysis_mode = 14;
  string degradation_level = 15;
  map<string, bool> signal_validity = 16;
  repeated string suppression_reasons = 17;
}

message PublishFeedbackRequest {
  string meeting_id = 1;
  string participant_id = 2;
  string participant_name = 3;
  string participant_role = 4;
  string feedback_type = 5;
  string severity = 6;
  int64 ts_ms = 7;
  int64 window_start_ms = 8;
  int64 window_end_ms = 9;
  string message = 10;
  string transcript_text = 11;
  float transcript_confidence = 12;
  AnalysisPayload analysis = 13;
}

message PublishFeedbackResponse {
  bool accepted = 1;
  string feedback_id = 2;
  string message = 3;
}
